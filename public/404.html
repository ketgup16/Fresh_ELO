<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Fresh ELO</title>
    <script>
      // GitHub Pages SPA redirect trick
      // Redirect /Fresh_ELO/some/path → /Fresh_ELO/?p=/some/path
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 2).join('/') +
        '/?p=' + encodeURIComponent(l.pathname.slice(l.pathname.split('/').slice(0,2).join('/').length) + l.search) +
        (l.hash ? l.hash : '')
      );
    </script>
  </head>
  <body></body>
</html>
